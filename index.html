<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Daycare Tracker" />
  <title>Puppy Daycare Tracker</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #fdf8f2; font-family: Georgia, serif; }

    #app { max-width: 420px; margin: 0 auto; min-height: 100vh; padding-bottom: 60px; position: relative; }

    /* Setup */
    #setup-wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
    #setup-card { background: white; border-radius: 20px; padding: 36px 32px 32px; box-shadow: 0 4px 32px rgba(0,0,0,0.08); width: 100%; max-width: 360px; text-align: center; }
    #setup-card h1 { font-size: 26px; font-weight: 700; color: #2c1a0e; margin: 12px 0 6px; }
    #setup-card p { color: #9e7c5a; font-size: 14px; margin-bottom: 24px; }
    .form-group { text-align: left; margin-top: 16px; }
    .form-group label { display: block; font-size: 13px; font-weight: 600; color: #6b4c2a; margin-bottom: 6px; }
    .form-group input { width: 100%; border: 1.5px solid #e8d8c4; border-radius: 10px; padding: 10px 14px; font-size: 15px; background: #fdf8f2; color: #2c1a0e; outline: none; font-family: inherit; }
    .optional { font-weight: 400; color: #bbb; font-size: 12px; }
    #setup-btn { margin-top: 24px; width: 100%; background: #f4a259; color: white; border: none; border-radius: 12px; padding: 13px 0; font-size: 16px; font-weight: 700; cursor: pointer; font-family: inherit; }

    /* Header */
    header { background: white; padding: 18px 20px 14px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #f0e4d4; }
    .header-left { display: flex; align-items: center; gap: 10px; }
    .header-title { font-size: 17px; font-weight: 700; color: #2c1a0e; line-height: 1.2; }
    .header-sub { font-size: 12px; color: #b08060; margin-top: 1px; }
    .header-stat { text-align: right; }
    .stat-num { display: block; font-size: 22px; font-weight: 700; color: #f4a259; line-height: 1; }
    .stat-label { font-size: 11px; color: #b08060; }

    /* Calendar card */
    .cal-card { background: white; margin: 16px 12px 0; border-radius: 16px; padding: 16px 12px 14px; box-shadow: 0 2px 16px rgba(0,0,0,0.06); }
    .cal-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
    .nav-btn { background: #fdf8f2; border: 1px solid #e8d8c4; border-radius: 8px; width: 34px; height: 34px; font-size: 18px; cursor: pointer; color: #6b4c2a; }
    .cal-title { font-weight: 700; font-size: 16px; color: #2c1a0e; }
    .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
    .day-label { text-align: center; font-size: 10px; font-weight: 700; color: #b08060; padding-bottom: 6px; letter-spacing: 0.5px; }
    .day-cell { aspect-ratio: 1; border-radius: 8px; border: none; background: #fdf8f2; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 1px; padding: 2px; font-family: inherit; }
    .day-cell.yes { background: #3d9970; }
    .day-cell.no { background: #e8d0cc; }
    .day-cell.today { border: 2px solid #f4a259; background: white; }
    .day-cell.selected { outline: 2.5px solid #2c1a0e; }
    .day-num { font-size: 11px; font-weight: 600; line-height: 1; }
    .no-dot { font-size: 9px; color: #c0392b; }

    /* Month stats */
    .month-stats { display: flex; gap: 10px; margin-top: 14px; justify-content: center; }
    .stat-pill { display: flex; align-items: center; gap: 5px; background: #fdf8f2; border-radius: 20px; padding: 6px 12px; font-size: 13px; }
    .pill-yes { color: #3d9970; font-weight: 700; }
    .pill-no { color: #c0392b; font-weight: 700; }
    .pill-label { color: #9e7c5a; font-size: 12px; }

    /* Log card */
    .log-card { background: white; margin: 12px 12px 0; border-radius: 16px; padding: 20px 18px; box-shadow: 0 2px 16px rgba(0,0,0,0.06); }
    .log-date { font-size: 13px; color: #b08060; margin-bottom: 14px; font-style: italic; }
    .log-q { font-size: 16px; color: #2c1a0e; margin-bottom: 16px; line-height: 1.4; }
    .log-btns { display: flex; gap: 10px; }
    .yes-btn { flex: 1; background: #3d9970; color: white; border: none; border-radius: 12px; padding: 13px 0; font-size: 16px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 7px; font-family: inherit; }
    .no-btn { flex: 1; background: #f0e4d4; color: #6b4c2a; border: none; border-radius: 12px; padding: 13px 0; font-size: 16px; font-weight: 700; cursor: pointer; font-family: inherit; }
    .log-result { display: flex; align-items: center; justify-content: space-between; }
    .log-result-icon { display: flex; align-items: center; gap: 8px; font-size: 16px; font-weight: 700; }
    .log-result-icon.yes { color: #3d9970; }
    .log-result-icon.no { color: #c0392b; }
    .change-btn { background: none; border: 1px solid #e8d8c4; border-radius: 8px; padding: 6px 12px; font-size: 12px; color: #9e7c5a; cursor: pointer; font-family: inherit; }

    /* Settings link */
    .settings-link { display: block; margin: 20px auto 0; background: none; border: none; color: #b08060; font-size: 13px; cursor: pointer; font-family: inherit; }

    /* Toast */
    #toast { position: fixed; top: 16px; left: 50%; transform: translateX(-50%); color: white; font-weight: 700; font-size: 14px; padding: 10px 20px; border-radius: 30px; box-shadow: 0 4px 16px rgba(0,0,0,0.15); z-index: 999; white-space: nowrap; font-family: Georgia, serif; display: none; }

    .hidden { display: none !important; }
  </style>
</head>
<body>

<div id="toast"></div>

<div id="app">

  <!-- SETUP VIEW -->
  <div id="setup-view">
    <div id="setup-wrap">
      <div id="setup-card">
        <svg width="56" height="56" viewBox="0 0 64 64" fill="#f4a259">
          <ellipse cx="32" cy="48" rx="14" ry="10"/>
          <ellipse cx="14" cy="32" rx="7" ry="9"/>
          <ellipse cx="50" cy="32" rx="7" ry="9"/>
          <ellipse cx="20" cy="16" rx="6" ry="8"/>
          <ellipse cx="44" cy="16" rx="6" ry="8"/>
        </svg>
        <h1>Daycare Tracker</h1>
        <p>Set up your pup's tracker in seconds</p>
        <div class="form-group">
          <label>Puppy's name</label>
          <input id="name-input" type="text" placeholder="e.g. Biscuit" />
        </div>
        <div class="form-group">
          <label>Daycare name <span class="optional">(optional)</span></label>
          <input id="daycare-input" type="text" placeholder="e.g. Happy Paws Daycare" />
        </div>
        <button id="setup-btn" onclick="handleSetup()">Let's go!</button>
      </div>
    </div>
  </div>

  <!-- TRACKER VIEW -->
  <div id="tracker-view" class="hidden">
    <header>
      <div class="header-left">
        <svg width="28" height="28" viewBox="0 0 64 64" fill="#f4a259">
          <ellipse cx="32" cy="48" rx="14" ry="10"/>
          <ellipse cx="14" cy="32" rx="7" ry="9"/>
          <ellipse cx="50" cy="32" rx="7" ry="9"/>
          <ellipse cx="20" cy="16" rx="6" ry="8"/>
          <ellipse cx="44" cy="16" rx="6" ry="8"/>
        </svg>
        <div>
          <div class="header-title" id="header-title"></div>
          <div class="header-sub" id="header-sub"></div>
        </div>
      </div>
      <div class="header-stat">
        <span class="stat-num" id="total-days">0</span>
        <span class="stat-label">total days</span>
      </div>
    </header>

    <div class="cal-card">
      <div class="cal-nav">
        <button class="nav-btn" onclick="prevMonth()">&#8249;</button>
        <span class="cal-title" id="cal-title"></span>
        <button class="nav-btn" onclick="nextMonth()">&#8250;</button>
      </div>
      <div class="cal-grid" id="cal-grid"></div>
      <div class="month-stats">
        <div class="stat-pill">
          <svg width="14" height="14" viewBox="0 0 64 64" fill="#3d9970"><ellipse cx="32" cy="48" rx="14" ry="10"/><ellipse cx="14" cy="32" rx="7" ry="9"/><ellipse cx="50" cy="32" rx="7" ry="9"/><ellipse cx="20" cy="16" rx="6" ry="8"/><ellipse cx="44" cy="16" rx="6" ry="8"/></svg>
          <span class="pill-yes" id="yes-count">0</span>
          <span class="pill-label">days at daycare</span>
        </div>
        <div class="stat-pill">
          <span>🏠</span>
          <span class="pill-no" id="no-count">0</span>
          <span class="pill-label">days home</span>
        </div>
      </div>
    </div>

    <div class="log-card" id="log-card"></div>

    <button class="settings-link" onclick="showSetup()">✏️ Edit puppy settings</button>
  </div>

</div>

<script>
  const STORAGE_KEY = "puppy-daycare-log";
  const SETTINGS_KEY = "puppy-daycare-settings";
  const DAYS = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];

  let settings = {};
  let log = {};
  let calYear, calMonth, selected;

  function load() {
    try { settings = JSON.parse(localStorage.getItem(SETTINGS_KEY)) || {}; } catch { settings = {}; }
    try { log = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; } catch { log = {}; }
  }

  function save() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(log));
    localStorage.setItem(SETTINGS_KEY, JSON.stringify(settings));
  }

  function todayStr() {
    const d = new Date();
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
  }

  function formatMonthYear(y, m) {
    return new Date(y, m).toLocaleString("default", { month: "long", year: "numeric" });
  }

  function pawSVG(size, color) {
    return `<svg width="${size}" height="${size}" viewBox="0 0 64 64" fill="${color}"><ellipse cx="32" cy="48" rx="14" ry="10"/><ellipse cx="14" cy="32" rx="7" ry="9"/><ellipse cx="50" cy="32" rx="7" ry="9"/><ellipse cx="20" cy="16" rx="6" ry="8"/><ellipse cx="44" cy="16" rx="6" ry="8"/></svg>`;
  }

  function showToast(msg, type) {
    const t = document.getElementById("toast");
    t.textContent = (type === "yes" ? "🐾 " : "🏠 ") + msg;
    t.style.background = type === "yes" ? "#3d9970" : "#c0392b";
    t.style.display = "block";
    setTimeout(() => t.style.display = "none", 2000);
  }

  function handleSetup() {
    const name = document.getElementById("name-input").value.trim();
    const daycare = document.getElementById("daycare-input").value.trim();
    if (!name) return;
    settings = { puppyName: name, daycareName: daycare };
    save();
    showTracker();
  }

  function showSetup() {
    document.getElementById("setup-view").classList.remove("hidden");
    document.getElementById("tracker-view").classList.add("hidden");
    document.getElementById("name-input").value = settings.puppyName || "";
    document.getElementById("daycare-input").value = settings.daycareName || "";
  }

  function showTracker() {
    document.getElementById("setup-view").classList.add("hidden");
    document.getElementById("tracker-view").classList.remove("hidden");
    renderTracker();
  }

  function renderTracker() {
    document.getElementById("header-title").textContent = settings.puppyName + "'s Daycare";
    const sub = document.getElementById("header-sub");
    sub.textContent = settings.daycareName || "";
    sub.style.display = settings.daycareName ? "block" : "none";

    const allYes = Object.values(log).filter(v => v === "yes").length;
    document.getElementById("total-days").textContent = allYes;

    renderCalendar();
    renderLogCard();
  }

  function renderCalendar() {
    document.getElementById("cal-title").textContent = formatMonthYear(calYear, calMonth);

    const daysInMonth = new Date(calYear, calMonth + 1, 0).getDate();
    const firstDay = new Date(calYear, calMonth, 1).getDay();
    const todayS = todayStr();

    let html = DAYS.map(d => `<div class="day-label">${d}</div>`).join("");
    for (let i = 0; i < firstDay; i++) html += `<div></div>`;

    for (let day = 1; day <= daysInMonth; day++) {
      const dateStr = `${calYear}-${String(calMonth+1).padStart(2,"0")}-${String(day).padStart(2,"0")}`;
      const entry = log[dateStr];
      const isToday = dateStr === todayS;
      const isSel = dateStr === selected;
      let cls = "day-cell";
      if (entry === "yes") cls += " yes";
      else if (entry === "no") cls += " no";
      else if (isToday) cls += " today";
      if (isSel) cls += " selected";

      let inner = `<span class="day-num">${day}</span>`;
      if (entry === "yes") inner += pawSVG(10, "rgba(255,255,255,0.85)");
      if (entry === "no") inner += `<span class="no-dot">—</span>`;

      html += `<button class="${cls}" onclick="selectDay('${dateStr}')">${inner}</button>`;
    }

    document.getElementById("cal-grid").innerHTML = html;

    const monthLog = Object.entries(log).filter(([k]) => {
      const [y, m] = k.split("-");
      return parseInt(y) === calYear && parseInt(m) === calMonth + 1;
    });
    document.getElementById("yes-count").textContent = monthLog.filter(([,v]) => v === "yes").length;
    document.getElementById("no-count").textContent = monthLog.filter(([,v]) => v === "no").length;
  }

  function renderLogCard() {
    const entry = log[selected];
    const dateObj = new Date(selected + "T12:00:00");
    const label = dateObj.toLocaleDateString("default", { weekday: "long", month: "long", day: "numeric", year: "numeric" });
    const name = settings.puppyName;

    let html = `<div class="log-date">${label}</div>`;
    if (!entry) {
      html += `<p class="log-q">Did <strong>${name}</strong> go to daycare today?</p>
        <div class="log-btns">
          <button class="yes-btn" onclick="logDay('yes')">${pawSVG(18,"white")} Yes!</button>
          <button class="no-btn" onclick="logDay('no')">🏠 No</button>
        </div>`;
    } else {
      const isYes = entry === "yes";
      html += `<div class="log-result">
        <div class="log-result-icon ${entry}">
          ${isYes ? pawSVG(28,"#3d9970") + " Went to daycare!" : "🏠 Stayed home"}
        </div>
        <button class="change-btn" onclick="removeDay()">Change</button>
      </div>`;
    }

    document.getElementById("log-card").innerHTML = html;
  }

  function selectDay(dateStr) {
    selected = dateStr;
    renderCalendar();
    renderLogCard();
  }

  function logDay(val) {
    log[selected] = val;
    save();
    showToast(val === "yes" ? `${settings.puppyName} went to daycare!` : `Day off for ${settings.puppyName}`, val);
    renderTracker();
  }

  function removeDay() {
    delete log[selected];
    save();
    renderTracker();
  }

  function prevMonth() {
    if (calMonth === 0) { calMonth = 11; calYear--; }
    else calMonth--;
    renderCalendar();
  }

  function nextMonth() {
    if (calMonth === 11) { calMonth = 0; calYear++; }
    else calMonth++;
    renderCalendar();
  }

  // Init
  load();
  const now = new Date();
  calYear = now.getFullYear();
  calMonth = now.getMonth();
  selected = todayStr();

  if (settings.puppyName) {
    showTracker();
  } else {
    document.getElementById("setup-view").classList.remove("hidden");
    document.getElementById("tracker-view").classList.add("hidden");
  }
</script>
</body>
</html>
